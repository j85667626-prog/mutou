<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>我在画里种良田</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      overflow: hidden;
      background: linear-gradient(180deg, #f5ecdd 0%, #e8dcc5 100%);
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
    }
    .loading-shell {
      position: fixed;
      inset: 0;
      background: #efe5d3;
      z-index: 2;
      transition: opacity .45s ease, visibility .45s ease;
    }
    .loading-shell.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #efe5d3;
    }
    .app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f5ecdd;
    }
    .music-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 4;
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 249, 239, 0.88);
      box-shadow: 0 12px 24px rgba(82, 52, 24, 0.16);
      color: #8a592d;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: transform .18s ease, opacity .18s ease;
    }
    .music-toggle:hover {
      transform: translateY(-1px);
    }
    .music-toggle.is-playing .music-icon {
      animation: spinNote 3.2s linear infinite;
    }
    .music-toggle.is-paused {
      opacity: 0.76;
    }
    .music-icon {
      font-size: 26px;
      line-height: 1;
      display: inline-flex;
      transform-origin: center;
    }
    @keyframes spinNote {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loadingShell" class="loading-shell">
    <iframe class="loading-frame" src="./assets/画卷.html" title="加载页"></iframe>
  </div>

  <audio id="bgmAudio" src="./bgm.mp3" loop preload="auto"></audio>
  <button id="musicToggle" class="music-toggle is-paused" type="button" aria-label="播放背景音乐" title="播放背景音乐">
    <span class="music-icon">♪</span>
  </button>
  <iframe class="app-frame" src="./app.html" title="主页面"></iframe>

  <script>
    const loadingShell = document.getElementById("loadingShell");
    const bgmAudio = document.getElementById("bgmAudio");
    const musicToggle = document.getElementById("musicToggle");
    let hasStartedBgm = false;

    function syncMusicUi() {
      const playing = !bgmAudio.paused;
      musicToggle.classList.toggle("is-playing", playing);
      musicToggle.classList.toggle("is-paused", !playing);
      musicToggle.setAttribute("aria-label", playing ? "暂停背景音乐" : "播放背景音乐");
      musicToggle.title = playing ? "暂停背景音乐" : "播放背景音乐";
    }

    async function playBgm() {
      try {
        bgmAudio.volume = 0.5;
        await bgmAudio.play();
        hasStartedBgm = true;
      } catch (error) {
      }
      syncMusicUi();
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "enter-app") {
        loadingShell.classList.add("hidden");
        playBgm();
      }
    });

    musicToggle.addEventListener("click", async () => {
      if (bgmAudio.paused) {
        await playBgm();
      } else {
        bgmAudio.pause();
        syncMusicUi();
      }
    });

    bgmAudio.addEventListener("play", syncMusicUi);
    bgmAudio.addEventListener("pause", syncMusicUi);
    syncMusicUi();
  </script>
</body>
</html>
